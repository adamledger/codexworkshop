<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Health Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #05070f;
      --bg-1: #0b1224;
      --bg-r1: rgba(85, 178, 255, 0.22);
      --bg-r2: rgba(43, 240, 174, 0.12);
      --title: #eaf3ff;
      --title-glow: rgba(89, 188, 255, 0.35);
      --panel: rgba(14, 22, 46, 0.72);
      --line: rgba(119, 162, 255, 0.35);
      --text: #e9f0ff;
      --muted: #a9b4d8;
      --up: #2bf0ae;
      --down: #ff5c88;
      --accent: #55b2ff;
      --warn: #ffc857;
      --ok-glow: 0 0 26px rgba(43, 240, 174, 0.35);
      --down-glow: 0 0 26px rgba(255, 92, 136, 0.35);
      --grid-line-a: rgba(255,255,255,0.03);
      --grid-line-b: rgba(255,255,255,0.02);
      --btn-border: rgba(127, 176, 255, 0.4);
      --btn-bg-a: rgba(31,54,113,0.65);
      --btn-bg-b: rgba(15,28,60,0.8);
      --btn-hover-border: rgba(130, 205, 255, 0.8);
      --btn-hover-glow: rgba(83, 168, 255, 0.25);
      --chip-bg: rgba(19, 33, 66, 0.8);
      --card-border: rgba(118, 168, 255, 0.35);
      --card-hover-border: rgba(154, 199, 255, 0.75);
      --toggle-text-up: #06111a;
      --toggle-text-down: #ffffff;
      --toggle-up-a: #69ffd0;
      --toggle-up-b: #2bf0ae;
      --toggle-down-a: #ff7098;
      --toggle-down-b: #ff487c;
      --banner-error: #ff9db7;
      --banner-ok: #89ffd9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      background:
        radial-gradient(1000px 600px at 85% -20%, var(--bg-r1), transparent 60%),
        radial-gradient(700px 420px at -10% 120%, var(--bg-r2), transparent 65%),
        linear-gradient(150deg, var(--bg-0), var(--bg-1));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--grid-line-a) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line-b) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(ellipse at center, black 35%, transparent 90%);
      opacity: 0.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 56px;
      position: relative;
      z-index: 1;
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font: 700 1.55rem/1.1 "Orbitron", sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--title);
      text-shadow: 0 0 20px var(--title-glow);
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--btn-border);
      background: linear-gradient(180deg, var(--btn-bg-a), var(--btn-bg-b));
      color: var(--text);
      padding: 10px 14px;
      border-radius: 11px;
      cursor: pointer;
      font: 600 0.9rem/1 "Space Grotesk", sans-serif;
      letter-spacing: 0.03em;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--btn-hover-border);
      box-shadow: 0 0 20px var(--btn-hover-glow);
    }

    .theme-select {
      border: 1px solid var(--btn-border);
      background: linear-gradient(180deg, var(--btn-bg-a), var(--btn-bg-b));
      color: var(--text);
      padding: 10px 12px;
      border-radius: 11px;
      font: 600 0.88rem/1 "Space Grotesk", sans-serif;
      letter-spacing: 0.03em;
      min-width: 140px;
      outline: none;
      cursor: pointer;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .chip {
      background: var(--chip-bg);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(4px);
    }

    .chip strong { color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      border: 1px solid var(--card-border);
      background: var(--panel);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.25s ease;
      animation: rise 0.45s ease both;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--card-hover-border);
    }

    .card.up { box-shadow: var(--ok-glow); }
    .card.down { box-shadow: var(--down-glow); }

    .service-name {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 12px;
      min-height: 46px;
      display: flex;
      align-items: center;
    }

    .state-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      box-shadow: 0 0 12px currentColor;
    }

    .toggle {
      border: 0;
      padding: 7px 10px;
      border-radius: 9px;
      min-width: 94px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--toggle-text-up);
    }

    .toggle.up {
      background: linear-gradient(160deg, var(--toggle-up-a), var(--toggle-up-b));
    }

    .toggle.down {
      color: var(--toggle-text-down);
      background: linear-gradient(160deg, var(--toggle-down-a), var(--toggle-down-b));
    }

    .status-banner {
      margin-top: 14px;
      min-height: 22px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .status-banner.error { color: var(--banner-error); }
    .status-banner.ok { color: var(--banner-ok); }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div>
        <h1>Service Health Matrix</h1>
        <div class="sub">Real-time health checks and manual service recovery controls</div>
      </div>
      <div class="controls">
        <select id="themeSelect" class="theme-select" aria-label="Theme">
          <option value="Techno">Theme: Techno</option>
          <option value="Happy">Theme: Happy</option>
          <option value="Day">Theme: Day</option>
        </select>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="autoBtn" type="button">Auto Refresh: ON</button>
      </div>
    </section>

    <section class="meta">
      <span class="chip">Total: <strong id="totalCount">0</strong></span>
      <span class="chip">Operational: <strong id="upCount">0</strong></span>
      <span class="chip">Down: <strong id="downCount">0</strong></span>
      <span class="chip">Last Sync: <strong id="lastSync">-</strong></span>
    </section>

    <section id="grid" class="grid"></section>
    <div id="statusBanner" class="status-banner"></div>
  </main>

  <script>
    const BASE_URL = "https://spathose-hygienically-sarita.ngrok-free.dev";
    const SERVICES_URL = `${BASE_URL}/services`;
    const STATUS_URL = `${BASE_URL}/services/status`;
    const LOGIC_APP_URL = "https://prod-255.westeurope.logic.azure.com:443/workflows/bb0d084d805c4af88046a0e2029858cb/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=vorp-R34-HsnkqvJMiRbhEeP-_tDx294bQG0wo9aNU4";
    const API_HEADERS = {
      "Accept": "application/json",
      "ngrok-skip-browser-warning": "true"
    };

    const grid = document.getElementById("grid");
    const totalCount = document.getElementById("totalCount");
    const upCount = document.getElementById("upCount");
    const downCount = document.getElementById("downCount");
    const lastSync = document.getElementById("lastSync");
    const statusBanner = document.getElementById("statusBanner");
    const refreshBtn = document.getElementById("refreshBtn");
    const autoBtn = document.getElementById("autoBtn");
    const themeSelect = document.getElementById("themeSelect");
    const rootStyle = document.documentElement.style;

    const THEMES = {
      Techno: {
        "--bg-0": "#05070f",
        "--bg-1": "#0b1224",
        "--bg-r1": "rgba(85, 178, 255, 0.22)",
        "--bg-r2": "rgba(43, 240, 174, 0.12)",
        "--title": "#eaf3ff",
        "--title-glow": "rgba(89, 188, 255, 0.35)",
        "--panel": "rgba(14, 22, 46, 0.72)",
        "--line": "rgba(119, 162, 255, 0.35)",
        "--text": "#e9f0ff",
        "--muted": "#a9b4d8",
        "--up": "#2bf0ae",
        "--down": "#ff5c88",
        "--ok-glow": "0 0 26px rgba(43, 240, 174, 0.35)",
        "--down-glow": "0 0 26px rgba(255, 92, 136, 0.35)",
        "--grid-line-a": "rgba(255,255,255,0.03)",
        "--grid-line-b": "rgba(255,255,255,0.02)",
        "--btn-border": "rgba(127, 176, 255, 0.4)",
        "--btn-bg-a": "rgba(31,54,113,0.65)",
        "--btn-bg-b": "rgba(15,28,60,0.8)",
        "--btn-hover-border": "rgba(130, 205, 255, 0.8)",
        "--btn-hover-glow": "rgba(83, 168, 255, 0.25)",
        "--chip-bg": "rgba(19, 33, 66, 0.8)",
        "--card-border": "rgba(118, 168, 255, 0.35)",
        "--card-hover-border": "rgba(154, 199, 255, 0.75)",
        "--toggle-text-up": "#06111a",
        "--toggle-text-down": "#ffffff",
        "--toggle-up-a": "#69ffd0",
        "--toggle-up-b": "#2bf0ae",
        "--toggle-down-a": "#ff7098",
        "--toggle-down-b": "#ff487c",
        "--banner-error": "#ff9db7",
        "--banner-ok": "#89ffd9"
      },
      Happy: {
        "--bg-0": "#20103f",
        "--bg-1": "#ff8f6b",
        "--bg-r1": "rgba(255, 228, 96, 0.35)",
        "--bg-r2": "rgba(126, 255, 207, 0.30)",
        "--title": "#fff7ea",
        "--title-glow": "rgba(255, 233, 132, 0.55)",
        "--panel": "rgba(58, 26, 92, 0.58)",
        "--line": "rgba(255, 224, 117, 0.45)",
        "--text": "#fff6f8",
        "--muted": "#ffe1d6",
        "--up": "#6cff8a",
        "--down": "#ff547f",
        "--ok-glow": "0 0 26px rgba(108, 255, 138, 0.42)",
        "--down-glow": "0 0 26px rgba(255, 84, 127, 0.40)",
        "--grid-line-a": "rgba(255,255,255,0.06)",
        "--grid-line-b": "rgba(255,245,212,0.06)",
        "--btn-border": "rgba(255, 221, 119, 0.65)",
        "--btn-bg-a": "rgba(112,38,146,0.68)",
        "--btn-bg-b": "rgba(68,24,117,0.82)",
        "--btn-hover-border": "rgba(255, 240, 165, 0.95)",
        "--btn-hover-glow": "rgba(255, 210, 114, 0.35)",
        "--chip-bg": "rgba(83, 30, 126, 0.62)",
        "--card-border": "rgba(255, 215, 122, 0.50)",
        "--card-hover-border": "rgba(255, 242, 180, 0.92)",
        "--toggle-text-up": "#142414",
        "--toggle-text-down": "#ffffff",
        "--toggle-up-a": "#beff83",
        "--toggle-up-b": "#49dd98",
        "--toggle-down-a": "#ff7aa9",
        "--toggle-down-b": "#ff4f7f",
        "--banner-error": "#ffd0df",
        "--banner-ok": "#c8ffe7"
      },
      Day: {
        "--bg-0": "#e9f6ff",
        "--bg-1": "#d6e9ff",
        "--bg-r1": "rgba(94, 157, 255, 0.18)",
        "--bg-r2": "rgba(79, 207, 183, 0.16)",
        "--title": "#0a315f",
        "--title-glow": "rgba(84, 150, 255, 0.30)",
        "--panel": "rgba(255, 255, 255, 0.68)",
        "--line": "rgba(83, 143, 235, 0.40)",
        "--text": "#143a67",
        "--muted": "#456d96",
        "--up": "#16b57e",
        "--down": "#d63262",
        "--ok-glow": "0 0 22px rgba(22, 181, 126, 0.26)",
        "--down-glow": "0 0 22px rgba(214, 50, 98, 0.24)",
        "--grid-line-a": "rgba(37, 83, 137, 0.09)",
        "--grid-line-b": "rgba(37, 83, 137, 0.06)",
        "--btn-border": "rgba(73, 132, 222, 0.52)",
        "--btn-bg-a": "rgba(255,255,255,0.85)",
        "--btn-bg-b": "rgba(227,240,255,0.92)",
        "--btn-hover-border": "rgba(50, 119, 222, 0.80)",
        "--btn-hover-glow": "rgba(88, 145, 229, 0.25)",
        "--chip-bg": "rgba(255,255,255,0.78)",
        "--card-border": "rgba(83, 143, 235, 0.42)",
        "--card-hover-border": "rgba(47, 114, 217, 0.75)",
        "--toggle-text-up": "#0a3c30",
        "--toggle-text-down": "#ffffff",
        "--toggle-up-a": "#7ef0c2",
        "--toggle-up-b": "#2fd097",
        "--toggle-down-a": "#ff89a5",
        "--toggle-down-b": "#e44e77",
        "--banner-error": "#c03560",
        "--banner-ok": "#0d8d63"
      }
    };

    let autoEnabled = true;
    let pollHandle = null;

    function applyTheme(themeName) {
      const theme = THEMES[themeName] || THEMES.Techno;
      Object.entries(theme).forEach(([key, value]) => {
        rootStyle.setProperty(key, value);
      });
      themeSelect.value = THEMES[themeName] ? themeName : "Techno";
    }

    function fmtTime() {
      return new Date().toLocaleString();
    }

    function setBanner(message, type = "") {
      statusBanner.textContent = message;
      statusBanner.className = `status-banner ${type}`.trim();
    }

    async function fetchServices(showBanner = true) {
      try {
        if (showBanner) setBanner("Syncing service states...");
        const res = await fetch(SERVICES_URL, { headers: API_HEADERS });
        if (!res.ok) throw new Error(`Fetch failed (${res.status})`);
        const data = await res.json();

        if (!data || !Array.isArray(data.services)) {
          throw new Error("Invalid response shape");
        }

        renderCards(data.services);
        updateSummary(data.services);
        lastSync.textContent = fmtTime();
        if (showBanner) setBanner("Service states updated.", "ok");
      } catch (err) {
        setBanner(`Unable to fetch services: ${err.message}`, "error");
      }
    }

    function updateSummary(services) {
      const total = services.length;
      const up = services.filter(s => s.up).length;
      totalCount.textContent = total;
      upCount.textContent = up;
      downCount.textContent = total - up;
    }

    function renderCards(services) {
      grid.innerHTML = "";

      services.forEach((service, idx) => {
        const card = document.createElement("article");
        card.className = `card ${service.up ? "up" : "down"}`;
        card.style.animationDelay = `${Math.min(idx * 40, 360)}ms`;

        const stateLabel = service.up ? "UP" : "DOWN";
        const dotColor = service.up ? "var(--up)" : "var(--down)";

        card.innerHTML = `
          <div class="service-name"></div>
          <div class="state-row">
            <span class="state">
              <span class="dot"></span>
              ${stateLabel}
            </span>
            <button type="button" class="toggle ${service.up ? "up" : "down"}">
              Set ${service.up ? "DOWN" : "UP"}
            </button>
          </div>
        `;

        const nameEl = card.querySelector(".service-name");
        const dot = card.querySelector(".dot");
        const btn = card.querySelector(".toggle");

        nameEl.textContent = service.name;
        dot.style.color = dotColor;

        btn.addEventListener("click", async () => {
          await updateServiceStatus(service.name, !service.up, btn);
        });

        grid.appendChild(card);
      });
    }

    async function updateServiceStatus(name, up, buttonEl) {
      const prevText = buttonEl.textContent;
      buttonEl.disabled = true;
      buttonEl.textContent = "Updating...";

      try {
        setBanner(`Updating ${name} to ${up ? "UP" : "DOWN"}...`);

        const res = await fetch(STATUS_URL, {
          method: "POST",
          headers: {
            ...API_HEADERS,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, up })
        });

        if (!res.ok) throw new Error(`Update failed (${res.status})`);

        const logicPayload = { name, up };
        const logicResult = await triggerLogicApp(logicPayload);
        if (logicResult.ok) {
          setBanner(`${name} set to ${up ? "UP" : "DOWN"} and Logic App triggered.`, "ok");
        } else {
          setBanner(`${name} set to ${up ? "UP" : "DOWN"}, but Logic App trigger failed: ${logicResult.error}`, "error");
        }
        await fetchServices(false);
      } catch (err) {
        setBanner(`Failed to update ${name}: ${err.message}`, "error");
      } finally {
        buttonEl.disabled = false;
        buttonEl.textContent = prevText;
      }
    }

    async function triggerLogicApp(payload) {
      try {
        const res = await fetch(LOGIC_APP_URL, {
          method: "POST",
          headers: {
            ...API_HEADERS,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          return { ok: false, error: `HTTP ${res.status}` };
        }

        return { ok: true };
      } catch (err) {
        return { ok: false, error: err.message };
      }
    }

    function applyPolling() {
      if (pollHandle) clearInterval(pollHandle);
      if (!autoEnabled) return;
      pollHandle = setInterval(() => fetchServices(false), 15000);
    }

    refreshBtn.addEventListener("click", () => fetchServices(true));

    autoBtn.addEventListener("click", () => {
      autoEnabled = !autoEnabled;
      autoBtn.textContent = `Auto Refresh: ${autoEnabled ? "ON" : "OFF"}`;
      applyPolling();
      setBanner(`Auto refresh ${autoEnabled ? "enabled" : "disabled"}.`);
    });

    themeSelect.addEventListener("change", () => {
      applyTheme(themeSelect.value);
      setBanner(`Theme changed to ${themeSelect.value}.`, "ok");
    });

    applyTheme("Techno");
    fetchServices(true);
    applyPolling();
  </script>
</body>
</html>
